<div class="nuevo-recurso">
  <div class="recurso-header">
    <h1>{{ esEdicion ? 'Editar Recurso' : 'Nuevo Recurso' }}</h1>
    <p>{{ esEdicion ? 'Edita y actualiza la información del recurso' : 'Crea, edita o publica un nuevo recurso para tus clientes.' }}</p>
  </div>

  <div class="recurso-form">
    <div class="form-group">
      <label>Título del recurso</label>
      <input type="text" placeholder="Escribe el título del recurso" class="form-input">
    </div>

    <div class="form-group">
      <label>Tipo de recurso</label>
      <select class="form-input">
        <option value="">Selecciona el tipo</option>
        <option value="fe">Fe y Espiritualidad</option>
        <option value="salud">Salud emocional</option>
        <option value="bienestar">Bienestar</option>
        <option value="crecimiento">Crecimiento Personal</option>
      </select>
    </div>

    <div class="form-group">
      <label>Presentación corta</label>
      <textarea placeholder="Escribe una breve descripción que se mostrará en tu página" class="form-textarea"></textarea>
    </div>

    <div class="form-group">
      <div class="tabs">
        <button class="tab activo">Subir archivo</button>
        <button class="tab">Escribir contenido</button>
      </div>
      <div class="upload-area">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p>Arrastra tu archivo aquí o</p>
        <button class="btn-seleccionar">Selecciona un archivo</button>
      </div>
    </div>

    <div class="form-group">
      <button class="btn-portada">
        <i class="fa-regular fa-image"></i> Seleccionar Portada (Imagen)
      </button>
    </div>

    <div class="form-footer">
      <div class="toggle-publicar">
        <label class="toggle">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
        <div>
          <p class="toggle-label">Publicar recurso</p>
          <p class="toggle-sub">El recurso será visible en tu página</p>
        </div>
      </div>
      <div class="form-buttons">
        <button class="btn-cancelar">Cancelar</button>
        <button class="btn-guardar">{{ esEdicion ? 'Actualizar Recurso' : 'Guardar Recurso' }}</button>
      </div>
    </div>
  </div>
</div>
